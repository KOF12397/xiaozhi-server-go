name: Test Suite  
  
on:  
  push:  
    branches: [ "main", "develop" ]  
  pull_request:  
    branches: [ "main" ]  
  
jobs:  
  test:  
    strategy:  
      matrix:  
        go-version: ['1.24.2']  
        os: [ubuntu-latest]  
      
    runs-on: ${{ matrix.os }}  
      
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v3  
  
      - name: Set up Go  
        uses: actions/setup-go@v4  
        with:  
          go-version: ${{ matrix.go-version }}  
  
      - name: Install system dependencies  
        run: |  
          sudo apt-get update  
          sudo apt-get install -y build-base autoconf automake libtool pkgconfig  
  
      - name: Build libopus  
        run: |  
          wget https://archive.mozilla.org/pub/opus/opus-1.3.1.tar.gz  
          tar xf opus-1.3.1.tar.gz  
          cd opus-1.3.1 && ./configure --enable-static --disable-shared && make -j$(nproc) && sudo make install && cd ..  
  
      - name: Run tests  
        env:  
          MATTERMOST_BASE_URL: ${{ secrets.MATTERMOST_BASE_URL }}  
          MATTERMOST_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}  
          MATTERMOST_TEST_CHANNEL: ${{ secrets.MATTERMOST_TEST_CHANNEL }}  
        run: |  
          go test -v -race -coverprofile=coverage.out ./...  
          go tool cover -html=coverage.out -o coverage.html  
  
      - name: Upload coverage to Codecov  
        uses: codecov/codecov-action@v3  
        with:  
          file: ./coverage.out
