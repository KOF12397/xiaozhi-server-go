name: Test Mattermost Integration  
  
on:  
  push:  
    branches: [ "main" ]  
  pull_request:  
    branches: [ "main" ]  
  workflow_dispatch:  
  
jobs:  
  test:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v3  
  
      - name: Set up Go  
        uses: actions/setup-go@v4  
        with:  
          go-version: '1.24.2'  
  
      - name: Setup Docker Buildx  
        uses: docker/setup-buildx-action@v2  
  
      - name: Build libopus and test in container  
        run: |  
          docker run --rm --platform=linux/amd64 \  
            -v "${{ github.workspace }}:/src" \  
            -w /src \  
            golang:1.24.2-alpine sh -c "\  
              apk add --no-cache build-base autoconf automake libtool pkgconfig musl-dev wget && \  
              wget https://archive.mozilla.org/pub/opus/opus-1.3.1.tar.gz && \  
              tar xf opus-1.3.1.tar.gz && \  
              cd opus-1.3.1 && \  
              ./configure --enable-static --disable-shared --disable-doc --disable-extra-programs && \  
              make -j$(nproc) && make install && \  
              cd /src && export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig && \  
              export CGO_ENABLED=1 && \  
              go test ./src/core/mattermost -v -timeout 30s && \  
              go mod tidy && \  
              go build -o xiaozhi-server ./src/main.go  
            "
