name: Test Mattermost Integration  
  
on:  
  push:  
    branches: [ "main" ]  
  pull_request:  
    branches: [ "main" ]  
  workflow_dispatch:  
  
jobs:  
  test:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v3  
  
      - name: Set up Go  
        uses: actions/setup-go@v4  
        with:  
          go-version: '1.24.2'  
  
      - name: Install dependencies  
        run: |  
          sudo apt-get update  
          sudo apt-get install -y build-essential pkg-config autoconf automake libtool wget libm-dev  
  
      - name: Download and build libopus  
        run: |  
          wget https://archive.mozilla.org/pub/opus/opus-1.3.1.tar.gz  
          tar xf opus-1.3.1.tar.gz  
          cd opus-1.3.1  
          ./configure --enable-static --disable-shared --disable-doc --disable-extra-programs LDFLAGS="-lm"  
          make -j$(nproc)  
          make install  
  
      - name: Run Mattermost tests  
        env:  
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig  
          MATTERMOST_BASE_URL: ${{ secrets.MATTERMOST_BASE_URL }}  
          MATTERMOST_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}  
          MATTERMOST_TEST_CHANNEL: ${{ secrets.MATTERMOST_TEST_CHANNEL }}  
        run: |  
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig  
          export CGO_ENABLED=1  
          go test ./src/core/mattermost -v -timeout 30s  
  
      - name: Build project  
        run: |  
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig  
          export CGO_ENABLED=1  
          go mod tidy  
          go build -o xiaozhi-server ./src/main.go
