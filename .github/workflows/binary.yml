name: Test Docker Build (Minimal)
on: workflow_dispatch  # 仅手动触发

jobs:
  test-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout empty (仅验证环境)
        uses: actions/checkout@v4
        with:
          path: src  # 模拟src目录

      - name: Create dummy main.go (排除业务代码影响)
        run: |
          mkdir -p src
          cat > src/main.go << EOF
          package main
          import "fmt"
          func main() { fmt.Println("test") }
          EOF
          cat > go.mod << EOF
          module test
          go 1.24.2
          EOF

      - name: Test Docker command (核心验证)
        run: |
          # 仅执行最简化的Docker命令，无业务依赖
          docker run --rm --platform=linux/amd64 -v "${{ github.workspace }}:/src" -w /src golang:1.24.2-alpine sh -c "cd src && go build -o ../test-server"
          ls -l ../test-server  # 验证产物生成
