name: Build Linux AMD64 Binary (No Docker)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：安装Go环境
      - name: Set up Go 1.24.2
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
          cache: true

      # 步骤3：安装CGO和Opus依赖（解决opus-go编译问题）
      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install -y --no-install-recommends \
            build-essential pkg-config libopus-dev upx-ucl

      # 步骤4：编译二进制（启用CGO，无Docker）
      - name: Build Linux AMD64 binary
        run: |
          cd src
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
          go build -v -ldflags "-s -w" -o ../linux-amd64-server

          # 可选：压缩二进制
          cp ../linux-amd64-server ../linux-amd64-server-upx
          upx --lzma ../linux-amd64-server-upx || echo "UPX压缩失败，跳过"

      # 步骤5：上传产物
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-binaries
          path: |
            linux-amd64-server
            linux-amd64-server-upx

      # 步骤6：打Tag时创建Release
      - name: Create GitHub Release (only for tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            linux-amd64-server
            linux-amd64-server-upx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
