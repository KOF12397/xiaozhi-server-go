name: Build Go binaries  

concurrency:  
  group: ${{ github.workflow }}-${{ github.ref }}  
  cancel-in-progress: true  

on:  
  push:  
    branches: [ "main" ]  
    tags:  
      - 'v*'  
  workflow_dispatch:  

env:  
  OPUS_VERSION: 1.3.1  
  GO_VERSION: 1.24.2  # 统一Go版本管理

permissions:  
  contents: write  

jobs:  
  build-windows-amd64:  
    runs-on: ubuntu-latest  
    timeout-minutes: 30  # 增加超时保护

    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4  # 升级到v4，修复兼容性

      - name: Set up Go  
        uses: actions/setup-go@v5  # 升级到v5
        with:  
          go-version: ${{ env.GO_VERSION }}  
          cache: true  # 启用Go mod缓存，加速构建

      - name: Install cross-compilation tools  
        run: |  
          sudo apt update -y  
          sudo apt install -y --no-install-recommends \
            mingw-w64 pkg-config build-essential wget upx-ucl \
            autoconf automake libtool  # 补充libopus编译依赖

      - name: Download & build libopus (static)  
        run: |  
          wget -q https://archive.mozilla.org/pub/opus/opus-${OPUS_VERSION}.tar.gz -O opus.tar.gz  
          tar xf opus.tar.gz  
          pushd opus-${OPUS_VERSION}  
          ./configure \  
            --host=x86_64-w64-mingw32 \  
            --disable-shared --enable-static \  
            --disable-doc --disable-extra-programs \  
            --prefix="$HOME/opus-win" \
            CFLAGS="-O2 -static"  # 补充编译优化
          make -j"$(nproc)"  
          make install  
          popd  

      - name: Configure env for Windows build  
        run: |  
          echo "PKG_CONFIG_PATH=$HOME/opus-win/lib/pkgconfig" >> $GITHUB_ENV  
          echo "CGO_ENABLED=1"                   >> $GITHUB_ENV  
          echo "GOOS=windows"                   >> $GITHUB_ENV  
          echo "GOARCH=amd64"                   >> $GITHUB_ENV  
          echo "CC=x86_64-w64-mingw32-gcc"      >> $GITHUB_ENV  
          echo "CXX=x86_64-w64-mingw32-g++"     >> $GITHUB_ENV  # 补充C++编译器

      - name: Fix Go mod for Windows (关键修复)  
        run: |  
          # 解决Mattermost依赖跨平台编译问题
          go env -w CGO_CFLAGS="-I$HOME/opus-win/include"  
          go env -w CGO_LDFLAGS="-L$HOME/opus-win/lib -lopus -static"  

      - name: Build & compress Windows binaries  
        run: |  
          go mod tidy -v  # 详细输出依赖拉取过程，便于排查
          cd src  
          # 移除易冲突的-static，改用CGO_LDFLAGS控制静态链接
          go build -v \  
            -ldflags "-s -w" \  
            -o ../windows-amd
