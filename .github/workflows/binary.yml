name: Minimal Build (Only Linux AMD64)
on:
  push:
    branches: ["main"]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.24.2
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
          cache: true

      - name: 安装CGO依赖（关键！解决opus-go编译问题）
        run: |
          sudo apt update -y
          sudo apt install -y --no-install-recommends \
            build-essential pkg-config libopus-dev  # 安装opus系统库+编译工具

      - name: Build Linux binary (启用CGO，适配opus-go)
        run: |
          cd src
          # 核心修改：启用CGO（必须！opus-go依赖CGO）
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -v -ldflags "-s -w" -o ../linux-amd64-server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-server
          path: linux-amd64-server

      - name: Create Release (only for tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: linux-amd64-server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
