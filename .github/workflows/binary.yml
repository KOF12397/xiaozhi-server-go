name: Minimal Build (Only Linux AMD64)
on:
  push:
    branches: ["main"]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：仅拉取代码，无多余依赖
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：仅安装Go环境，无其他工具
      - name: Set up Go 1.24.2
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
          cache: true

      # 步骤3：禁用CGO，跳过所有C依赖（核心！避开libopus/编译链问题）
      - name: Build Linux binary (NO CGO)
        run: |
          cd src
          # 禁用CGO，彻底避开所有C库依赖和编译错误
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -ldflags "-s -w" -o ../linux-amd64-server

      # 步骤4：仅上传产物，无压缩/复杂操作
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-server
          path: linux-amd64-server

      # 步骤5：仅在打Tag时创建Release（可选）
      - name: Create Release (only for tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: linux-amd64-server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
