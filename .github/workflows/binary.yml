name: Test Docker Build (Final Fix)
on: workflow_dispatch

jobs:
  test-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 清理Docker环境（避免缓存干扰）
        run: |
          docker system prune -af
          docker --version
          docker info | grep -E "Server Version|OSType"

      - name: 2. 创建极简测试代码（完全隔离业务）
        run: |
          mkdir -p ${{ github.workspace }}/src
          echo 'package main; import "fmt"; func main() { fmt.Println("test success") }' > ${{ github.workspace }}/src/main.go
          echo 'module test' > ${{ github.workspace }}/go.mod
          echo 'go 1.24.2' >> ${{ github.workspace }}/go.mod

      - name: 3. 执行Docker编译（零换行+绝对路径+无转义）
        # 核心：整个docker命令写在一行，用绝对路径，无任何换行/转义符
        run: docker run --rm --platform=linux/amd64 -v "${{ github.workspace }}:/src" -w /src golang:1.24.2-alpine sh -c "cd /src && go mod tidy && cd src && go build -o /src/test-server main.go && ls -l /src/test-server"

      - name: 4. 验证产物
        run: |
          ls -l ${{ github.workspace }}/test-server
          chmod +x ${{ github.workspace }}/test-server
          ${{ github.workspace }}/test-server || echo "Windows二进制无需执行验证"
